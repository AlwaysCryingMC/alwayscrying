<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · AlwaysCrying</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <style>
    :root { --pink:#ff5c8a; --teal:#2ec4b6; --ink:#241637; --cream:#f7f3ef; }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh; display: grid; place-items: center;
      background: var(--cream); color: var(--ink);
      font-family: 'Inter', system-ui, -apple-system, "Segoe UI", sans-serif;
      text-align: center; padding: 2rem;
    }
    h1 { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(5rem, 18vw, 12rem); line-height: .9; }
    .pink { color: var(--pink); } .teal { color: var(--teal); }
    p { margin-top: 1rem; font-size: 1.1rem; opacity: .8; }
    a { display: inline-block; margin-top: 2rem; color: #fff; background: var(--pink);
        text-decoration: none; padding: .85rem 1.8rem; border-radius: 999px; font-weight: 600;
        transition: transform .2s, box-shadow .2s; }
    a:hover { transform: translateY(-3px); box-shadow: 0 12px 30px -10px var(--pink); }
  </style>
</head>
<body>
  <main>
    <h1><span class="pink">4</span>0<span class="teal">4</span></h1>
    <p>这一页好像飘走了……</p>
    <a href="/">回到首页</a>
  </main>
</body>
</html>
