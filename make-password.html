<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>生成后台密码哈希 · AlwaysCrying</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/" aria-label="AlwaysCrying 首页">
        <span class="mark">AC</span>
        <span>AlwaysCrying<small>· .art</small></span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="blog.html">博客</a>
        <a href="admin.html">发布</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <div class="auth-box editor-card" style="max-width:520px;margin-top:1.6rem">
        <span class="eyebrow">一次性工具</span>
        <h1 class="h3" style="margin-top:.4rem">设置后台密码</h1>
        <p class="s" style="line-height:1.7">在这里输入你想用的密码，生成一串<b>哈希</b>。密码<b>不会离开你的浏览器</b>——整个过程都在本地完成，不上传任何地方。</p>

        <div class="field">
          <label for="pw">想设的密码</label>
          <input id="pw" type="password" placeholder="输入密码" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="pw2">再输一次（确认）</label>
          <input id="pw2" type="password" placeholder="再输入一遍" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" id="genBtn" style="width:100%">生成哈希</button>

        <div id="out" class="hidden" style="margin-top:1.4rem">
          <div class="banner teal" style="margin-bottom:1rem">✅ 复制下面这串哈希，粘到 <code>js/admin.js</code> 顶部的 <code>PASSWORD_HASH = "..."</code> 里，然后提交到 GitHub。</div>
          <div class="field" style="margin-bottom:.8rem">
            <label>SHA-256 哈希（复制这个）</label>
            <textarea id="hashOut" class="tall" readonly style="min-height:90px;font-size:.85rem"></textarea>
          </div>
          <button class="btn btn-outline" id="copyBtn">复制哈希</button>
          <p class="s" style="margin-top:1rem;line-height:1.7">改完后访问 <code>admin.html</code> 就要先输密码才能进后台了。<br/>哈希可以公开（已经写在公开仓库里），但<b>明文密码别告诉任何人</b>。</p>
        </div>

        <p id="err" class="banner hidden" style="margin-top:1.1rem;margin-bottom:0"></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-row">
      <p class="copy">© <span id="year"></span> AlwaysCrying · 密码哈希生成器</p>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    async function sha256(s) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
      return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    const $ = (id) => document.getElementById(id);
    const err = $("err");

    function showErr(m) { err.textContent = m; err.classList.remove("hidden"); }
    function clearErr() { err.classList.add("hidden"); }

    $("genBtn").addEventListener("click", async () => {
      clearErr();
      const a = $("pw").value, b = $("pw2").value;
      if (!a) return showErr("请输入密码");
      if (a.length < 6) return showErr("密码至少 6 位，建议更长一些");
      if (a !== b) return showErr("两次输入不一致");
      const hash = await sha256(a);
      $("hashOut").value = hash;
      $("out").classList.remove("hidden");
      $("hashOut").focus();
      $("hashOut").select();
    });

    $("copyBtn").addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText($("hashOut").value);
        $("copyBtn").textContent = "已复制 ✅";
        setTimeout(() => ($("copyBtn").textContent = "复制哈希"), 1600);
      } catch {
        $("hashOut").select();
        document.execCommand("copy");
        $("copyBtn").textContent = "已复制 ✅";
        setTimeout(() => ($("copyBtn").textContent = "复制哈希"), 1600);
      }
    });

    $("pw2").addEventListener("keydown", (e) => { if (e.key === "Enter") $("genBtn").click(); });
  </script>
</body>
</html>
