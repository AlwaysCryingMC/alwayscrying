<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store · AlwaysCrying</title>
  <meta name="description" content="AlwaysCrying 商店 · 数字商品 & 赞助" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/store.css" />
</head>
<body>

  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/">
        <span class="mark">AC</span>
        <span>AlwaysCrying<small>· .art</small></span>
      </a>
      <button class="nav-toggle" aria-label="菜单" aria-expanded="false"><span></span></button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="blog.html">博客</a>
        <a href="store.html" class="active">商店</a>
        <a href="sponsor.html">赞助</a>
        <a href="admin.html">后台</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <div class="store-header">
        <h1>🛒 商店</h1>
        <p>数字商品 · 源码 · 工具 · 服务</p>
      </div>

      <!-- Category tabs -->
      <div class="store-tabs" id="storeTabs">
        <button class="btn btn-primary tab active" data-cat="all">全部</button>
      </div>

      <!-- Product grid -->
      <div class="store-grid" id="storeGrid">
        <p class="s">加载中…</p>
      </div>
    </div>
  </main>

  <!-- WeChat Pay Modal -->
  <div id="payModal" class="modal hidden">
    <div class="modal-content">
      <span class="modal-close" id="payClose">&times;</span>
      <h2>微信支付</h2>
      <p id="payProductName"></p>
      <p class="price" id="payPrice"></p>
      <div class="qr-box">
        <img id="payQR" src="" alt="微信支付二维码" />
      </div>
      <p class="s">请使用微信扫一扫付款</p>
      <p class="s">付款后联系客服确认订单</p>
    </div>
  </div>

  <footer class="site-footer">
    <div class="wrap">
      <p>&copy; 2026 AlwaysCrying · Powered by GitHub Pages</p>
    </div>
  </footer>

  <script src="js/store.js"></script>
</body>
</html>
