<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>管理商店 · AlwaysCrying</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/store.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/"><span class="mark">AC</span><span>AlwaysCrying<small>· .art</small></span></a>
      <nav class="nav-links">
        <a href="index.html">首页</a>
        <a href="store.html">商店</a>
        <a href="admin.html">发布</a>
        <a href="admin-store.html" class="active">管店</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="wrap">
      <!-- Config -->
      <div id="configView" class="editor-card" style="max-width:580px">
        <h1 class="h3">🔧 配置 GitHub</h1>
        <div class="banner teal">
          商品数据存入 <code>data/store.json</code>，通过 GitHub API 直接提交。
          Token 仅存浏览器，只发往 GitHub。
        </div>
        <div class="field"><label>用户名</label><input id="owner" placeholder="AlwaysCryingMC" /></div>
        <div class="field"><label>仓库</label><input id="repo" placeholder="alwayscrying" /></div>
        <div class="field"><label>分支</label><input id="branch" value="main" /></div>
        <div class="field"><label>Token</label><input id="token" type="password" placeholder="github_pat_..." /></div>
        <button class="btn btn-primary" id="saveCfg">保存配置并加载商品</button>
        <p id="cfgMsg" class="banner hidden" style="margin-top:1rem"></p>
      </div>

      <!-- Product Manager -->
      <div id="appView" class="hidden">
        <div class="toolbar">
          <h1 class="h3">🏪 商品管理</h1>
          <button class="btn btn-outline" id="clearCfgBtn">清除配置</button>
        </div>

        <div class="admin-shell">
          <aside class="admin-side">
            <div class="panel">
              <h3>商品列表</h3>
              <p class="s">点击载入编辑，🗑 删除</p>
              <div id="productList"><p class="s">加载中…</p></div>
            </div>
          </aside>

          <section class="editor-card">
            <form id="productForm">
              <input type="hidden" id="prodId" />
              <div class="field">
                <label>商品名称 *</label>
                <input id="prodName" required placeholder="商品名称" />
              </div>
              <div class="field-row">
                <div class="field">
                  <label>价格 (¥) *</label>
                  <input id="prodPrice" type="number" step="0.01" min="0" value="9.9" required />
                </div>
                <div class="field">
                  <label>分类</label>
                  <input id="prodCat" placeholder="例如: 源码, 工具, 服务" />
                </div>
              </div>
              <div class="field">
                <label>描述</label>
                <textarea id="prodDesc" placeholder="商品描述..."></textarea>
              </div>
              <div class="field">
                <label>图片 URL</label>
                <input id="prodImg" placeholder="https://... 或留空" />
                <img id="prodImgPreview" class="preview-img hidden" />
              </div>
              <div class="field">
                <label>支付二维码 URL（留空使用默认）</label>
                <input id="prodQR" placeholder="https://... 或留空" />
              </div>
              <div class="field-row" style="align-items:center">
                <label class="switch"><input type="checkbox" id="prodActive" checked /> 上架</label>
              </div>
              <div class="btn-row" style="margin-top:.5rem">
                <button type="submit" class="btn btn-primary" id="saveBtn">➕ 添加商品</button>
                <button type="button" class="btn btn-outline" id="resetBtn">清空</button>
                <span id="prodHint" class="s"></span>
              </div>
            </form>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="js/store-admin.js"></script>
</body>
</html>
