<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目 · AlwaysCrying</title>
  <meta name="description" content="AlwaysCrying 发布的项目 —— 代码、设计、创作。" />
  <meta property="og:title" content="项目 · AlwaysCrying" />
  <meta property="og:description" content="AlwaysCrying 发布的项目作品。" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Projects page specific */
    .projects-hero {
      padding-top: clamp(2rem, 5vw, 4rem);
      padding-bottom: clamp(2rem, 4vw, 3rem);
      text-align: center;
    }
    .projects-hero .lead { margin-inline: auto; margin-top: 1rem; }

    /* Filter chips */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: .55rem;
      justify-content: center;
      margin-bottom: clamp(2rem, 4vw, 3rem);
    }
    .filter-chip {
      padding: .55rem 1.1rem; border-radius: 999px;
      background: var(--paper); border: 1px solid var(--line);
      font-size: .88rem; font-weight: 500; cursor: pointer;
      transition: all .25s var(--ease);
      font-family: var(--f-body); color: var(--ink-soft);
    }
    .filter-chip:hover { border-color: var(--pink); color: var(--ink); }
    .filter-chip.active {
      background: var(--pink); color: #fff; border-color: var(--pink);
      box-shadow: 0 4px 16px -6px rgba(255,92,138,.45);
    }

    /* Project cards */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: clamp(1.2rem, 2.5vw, 2rem);
    }
    .project-card {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: var(--radius); overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform .35s var(--ease), box-shadow .35s var(--ease), border-color .35s;
    }
    .project-card:hover {
      transform: translateY(-5px); box-shadow: var(--shadow); border-color: transparent;
    }
    .project-cover {
      aspect-ratio: 16/10; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .project-cover .swatch {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--c1, #ff5c8a), var(--c2, #7b5cff));
    }
    .project-cover .cover-icon {
      position: relative; z-index: 1;
      font-size: 3.5rem; filter: drop-shadow(0 4px 12px rgba(0,0,0,.2));
    }
    .project-cover .status-badge {
      position: absolute; top: 1rem; right: 1rem; z-index: 2;
      padding: .35rem .85rem; border-radius: 999px;
      font-size: .75rem; font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .status-badge.active {
      background: rgba(46,196,182,.25); color: var(--teal-deep);
      border: 1px solid rgba(46,196,182,.4);
    }
    .status-badge.wip {
      background: rgba(255,92,138,.2); color: var(--pink-deep);
      border: 1px solid rgba(255,92,138,.35);
    }
    .status-badge.archived {
      background: rgba(138,125,153,.2); color: var(--muted);
      border: 1px solid rgba(138,125,153,.3);
    }

    .project-body {
      padding: 1.4rem 1.5rem 1.6rem;
      display: flex; flex-direction: column; gap: .7rem; flex: 1;
    }
    .project-body .tags { display: flex; flex-wrap: wrap; gap: .4rem; }
    .project-body .tag {
      padding: .25rem .7rem; border-radius: 999px;
      font-size: .76rem; font-weight: 600;
    }
    .project-body .tag.lang { background: var(--teal-soft); color: var(--teal-deep); }
    .project-body .tag.type { background: var(--grape-soft); color: var(--grape); }
    .project-body .tag.tool { background: var(--pink-soft); color: var(--pink-deep); }
    .project-body h3 {
      font-size: 1.25rem; line-height: 1.2;
      font-family: var(--f-display); font-weight: 600;
    }
    .project-body .desc {
      font-size: .94rem; color: var(--ink-soft); line-height: 1.6; flex: 1;
    }
    .project-body .meta-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-top: .2rem;
    }
    .project-body .stars {
      display: flex; align-items: center; gap: .35rem;
      font-size: .85rem; color: var(--muted);
    }
    .project-body .stars svg { color: #f59e0b; }
    .project-body .link-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      font-weight: 600; font-size: .9rem;
      color: var(--pink-deep); transition: gap .25s;
    }
    .project-body .link-btn svg { transition: transform .25s var(--ease); }
    .project-body .link-btn:hover { gap: .65rem; }
    .project-body .link-btn:hover svg { transform: translateX(3px); }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 4rem 1rem;
    }
    .empty-state .big { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state p { color: var(--muted); }

    @media (max-width: 760px) {
      .project-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ============ 顶部导航 ============ -->
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/" aria-label="AlwaysCrying 首页">
        <span class="mark">AC</span>
        <span>AlwaysCrying<small>· .art</small></span>
      </a>
      <button class="nav-toggle" aria-label="菜单" aria-expanded="false"><span></span></button>
      <nav class="nav-links" id="navLinks">
        <a href="index.html">首页</a>
        <a href="index.html#about">关于</a>
        <a href="blog.html">博客</a>
        <a href="projects.html" class="active">项目</a>
        <a href="index.html#contact">联系</a>
        <a href="admin.html">后台</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- ============ Hero ============ -->
    <section class="projects-hero">
      <div class="wrap">
        <span class="eyebrow reveal">项目</span>
        <h1 class="display reveal" style="margin-top:1rem">
          我做的<span class="pink italic">东西</span>
        </h1>
        <p class="lead reveal">
          这里是我发布过的项目 —— 从想法到代码，每一个都认真打磨过。
        </p>
      </div>
    </section>

    <!-- ============ 分类筛选 ============ -->
    <section style="padding-bottom: clamp(3rem, 6vw, 5rem);">
      <div class="wrap">
        <div class="filter-bar reveal" id="filterBar">
          <button class="filter-chip active" data-cat="all">全部</button>
        </div>

        <div class="project-grid" id="projectGrid">
          <div class="skeleton card-s"></div>
          <div class="skeleton card-s"></div>
          <div class="skeleton card-s"></div>
        </div>
      </div>
    </section>
  </main>

  <!-- ============ 页脚 ============ -->
  <footer class="site-footer">
    <div class="wrap footer-row">
      <p class="copy">© <span id="year"></span> AlwaysCrying · 每一个项目都用心构建</p>
      <div class="socials">
        <a href="https://github.com/AlwaysCryingMC/" target="_blank" rel="noopener" aria-label="GitHub" title="GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5A11.5 11.5 0 0 0 .5 12 11.5 11.5 0 0 0 8.4 23c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.5-1.4-1.3-1.8-1.3-1.8-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17 5 18 5.3 18 5.3c.6 1.7.2 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A11.5 11.5 0 0 0 23.5 12 11.5 11.5 0 0 0 12 .5Z"/></svg>
        </a>
        <a href="mailto:ytchatoyant@gmail.com" aria-label="Email" title="Email">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script>
    // ============================================================
    // Projects page — loads data/projects.json from the GitHub repo
    // ============================================================
    const PROJECTS_URL =
      'https://raw.githubusercontent.com/AlwaysCryingMC/alwayscrying/main/data/projects.json';

    const grid = document.getElementById('projectGrid');
    const filterBar = document.getElementById('filterBar');
    let allProjects = [];
    let categories = new Set();

    // ---------- helpers ----------
    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    const STATUS_MAP = {
      active:  { label: '活跃', cls: 'active' },
      wip:     { label: '开发中', cls: 'wip' },
      archived:{ label: '归档', cls: 'archived' },
    };

    const SWATCHES = [
      ['#ff5c8a','#7b5cff'],
      ['#2ec4b6','#1da093'],
      ['#7b5cff','#ff5c8a'],
      ['#f59e0b','#e63e6f'],
      ['#6366f1','#2ec4b6'],
      ['#ec4899','#8b5cf6'],
    ];

    // ---------- load ----------
    async function loadProjects() {
      try {
        const r = await fetch(PROJECTS_URL + '?t=' + Date.now());
        if (!r.ok) throw new Error('Failed to load');
        const data = await r.json();
        allProjects = data.projects || [];
        allProjects.forEach(p => { if (p.category) categories.add(p.category); });
        renderFilters();
        renderProjects('all');
      } catch (e) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="big">🚀</div>
            <h2 class="h3">项目即将上线</h2>
            <p class="lead" style="margin-top:.4rem">正在整理项目中，稍后回来看看。</p>
          </div>`;
      }
    }

    // ---------- filters ----------
    function renderFilters() {
      let html = '<button class="filter-chip active" data-cat="all">全部</button>';
      for (const c of categories) {
        html += `<button class="filter-chip" data-cat="${esc(c)}">${esc(c)}</button>`;
      }
      filterBar.innerHTML = html;
      filterBar.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          renderProjects(chip.dataset.cat);
        });
      });
    }

    // ---------- render ----------
    function renderProjects(cat) {
      const filtered = cat === 'all'
        ? allProjects
        : allProjects.filter(p => p.category === cat);

      if (!filtered.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="big">📭</div>
            <p>该分类下暂无项目。</p>
          </div>`;
        return;
      }

      grid.innerHTML = filtered.map((p, i) => {
        const swatch = p.colors || SWATCHES[i % SWATCHES.length];
        const status = STATUS_MAP[p.status] || STATUS_MAP.active;
        const icon = p.icon || '📦';

        const tags = [];
        if (p.language) {
          tags.push(`<span class="tag lang">${esc(p.language)}</span>`);
        }
        if (p.type) {
          tags.push(`<span class="tag type">${esc(p.type)}</span>`);
        }
        if (p.framework) {
          tags.push(`<span class="tag tool">${esc(p.framework)}</span>`);
        }

        const starsHtml = p.stars !== undefined
          ? `<div class="stars">
               <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
               ${p.stars}
             </div>`
          : '';

        const linkHtml = p.url
          ? `<a class="link-btn" href="${esc(p.url)}" target="_blank" rel="noopener">
               查看项目
               <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
             </a>`
          : '';

        return `
          <div class="project-card reveal">
            <div class="project-cover">
              <div class="swatch" style="--c1:${swatch[0]};--c2:${swatch[1]}"></div>
              <span class="cover-icon">${esc(icon)}</span>
              <span class="status-badge ${status.cls}">${status.label}</span>
            </div>
            <div class="project-body">
              <div class="tags">${tags.join('')}</div>
              <h3>${esc(p.name)}</h3>
              <p class="desc">${esc(p.description || '暂无描述')}</p>
              <div class="meta-row">
                ${starsHtml}
                ${linkHtml}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ---------- nav toggle ----------
    const toggle = document.querySelector('.nav-toggle');
    const links = document.querySelector('#navLinks');
    toggle?.addEventListener('click', () => {
      const open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', String(open));
    });
    document.querySelectorAll('.nav-links a').forEach(a =>
      a.addEventListener('click', () => links.classList.remove('open'))
    );

    // ---------- year ----------
    const y = document.getElementById('year');
    if (y) y.textContent = new Date().getFullYear();

    // ---------- reveal on scroll ----------
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: .15 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // ---------- kick off ----------
    loadProjects();
  </script>
</body>
</html>
